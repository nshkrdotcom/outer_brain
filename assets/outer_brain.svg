      <stop offset="0.62" stop-color="#14182f"/>
      <stop offset="1" stop-color="#080b13"/>
    </radialGradient>
    <linearGradient id="outerbrain-brain" x1="53" y1="61" x2="147" y2="137" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f4a7ff"/>
      <stop offset="0.55" stop-color="#77e5ff"/>
      <stop offset="1" stop-color="#8dffb0"/>
    </linearGradient>
    <filter id="outerbrain-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
