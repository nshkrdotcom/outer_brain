<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" role="img" aria-labelledby="outerbrain-title outerbrain-desc">
  <title id="outerbrain-title">OuterBrain</title>
  <desc id="outerbrain-desc">A hexagonal semantic brain with journal pages, bounded context ring, guardrails, memory nodes, and restart replay path.</desc>
  <defs>
    <clipPath id="outerbrain-hex">
      <path d="M100 4 L183 52 L183 148 L100 196 L17 148 L17 52 Z"/>
    </clipPath>
    <radialGradient id="outerbrain-bg" cx="50%" cy="40%" r="70%">
